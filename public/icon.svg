<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a1b4e" />
      <stop offset="100%" stop-color="#0a0614" />
    </radialGradient>
    
    <!-- Neon Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6b21a8" />
    </linearGradient>

    <!-- Neon Cyan Accent Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Solid rounded background for PWA/iOS Maskable Icon compatibility -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />
  <rect width="492" height="492" x="10" y="10" rx="90" fill="none" stroke="url(#purpleGrad)" stroke-width="4" opacity="0.4" />

  <!-- Dumbbell Grid Design -->
  <g transform="translate(256, 256) scale(1.15)" filter="url(#glow)">
    <!-- Dumbbell Handle -->
    <rect x="-100" y="-12" width="200" height="24" rx="12" fill="url(#cyanGrad)" />
    
    <!-- Dumbbell Outer Weight Rings & Side Plates -->
    <!-- Left Weight Inner -->
    <rect x="-135" y="-60" width="35" height="120" rx="15" fill="url(#purpleGrad)" />
    <!-- Left Weight Outer -->
    <rect x="-155" y="-45" width="20" height="90" rx="10" fill="url(#purpleGrad)" opacity="0.8" />
    
    <!-- Right Weight Inner -->
    <rect x="100" y="-60" width="35" height="120" rx="15" fill="url(#purpleGrad)" />
    <!-- Right Weight Outer -->
    <rect x="135" y="-45" width="20" height="90" rx="10" fill="url(#purpleGrad)" opacity="0.8" />
    
    <!-- Center AI Sparkle / Brain Nodes -->
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="16" fill="#ffffff" />
      <!-- Star sparks for "AI/Lean Bulk" -->
      <path d="M 0 -35 L 5 -10 L 30 -5 L 5 0 L 0 25 L -5 0 L -30 -5 L -5 -10 Z" fill="#ffffff" opacity="0.9" />
    </g>
  </g>
  
  <text x="256" y="440" text-anchor="middle" fill="#a855f7" font-family="'Inter', sans-serif" font-weight="900" font-size="32" letter-spacing="4" opacity="0.8">LEAN BULK AI</text>
</svg>
